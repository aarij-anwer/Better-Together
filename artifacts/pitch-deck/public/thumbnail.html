<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 720px;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: linear-gradient(135deg, #1E1B18 0%, #2A1F1A 40%, #3D1F1A 100%);
  position: relative;
}
.bg-accent {
  position: absolute;
  top: -100px;
  left: -100px;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,82,74,0.25) 0%, transparent 70%);
}
.bg-accent-2 {
  position: absolute;
  bottom: -150px;
  right: -150px;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
}
.content {
  position: relative;
  z-index: 10;
  display: flex;
  width: 100%;
  height: 100%;
}
.text-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 20px 60px 70px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(232,82,74,0.2);
  border: 1.5px solid rgba(232,82,74,0.4);
  border-radius: 30px;
  padding: 8px 22px;
  margin-bottom: 28px;
  width: fit-content;
}
.badge-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #E8524A;
}
.badge-text {
  font-size: 18px;
  font-weight: 800;
  color: rgba(255,255,255,0.7);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.title {
  font-size: 120px;
  font-weight: 900;
  color: white;
  line-height: 0.92;
  letter-spacing: -4px;
  margin-bottom: 24px;
}
.title span {
  color: #E8524A;
}
.subtitle {
  font-size: 28px;
  font-weight: 800;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
}
.photo-side {
  width: 520px;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.photo-glow {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,82,74,0.3) 0%, transparent 70%);
}
.photo-side img {
  position: relative;
  z-index: 2;
  height: 680px;
  width: auto;
  object-fit: contain;
  object-position: bottom;
  filter: drop-shadow(0 0 60px rgba(232,82,74,0.3));
}
.corner-line {
  position: absolute;
  top: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  border-top: 3px solid rgba(232,82,74,0.5);
  border-right: 3px solid rgba(232,82,74,0.5);
  z-index: 20;
}
.corner-line-bl {
  position: absolute;
  bottom: 30px;
  left: 30px;
  width: 60px;
  height: 60px;
  border-bottom: 3px solid rgba(232,82,74,0.5);
  border-left: 3px solid rgba(232,82,74,0.5);
  z-index: 20;
}
</style>
</head>
<body>
  <div class="bg-accent"></div>
  <div class="bg-accent-2"></div>
  <div class="corner-line"></div>
  <div class="corner-line-bl"></div>
  <div class="content">
    <div class="text-side">
      <div class="badge">
        <div class="badge-dot"></div>
        <span class="badge-text">Get Better Together</span>
      </div>
      <div class="title">WEEK<br><span>2</span></div>
      <div class="subtitle">UPDATE</div>
    </div>
    <div class="photo-side">
      <div class="photo-glow"></div>
      <img src="photo_no_bg.png" alt="Photo">
    </div>
  </div>
</body>
</html>
